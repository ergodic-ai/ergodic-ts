site_name: Ergodic TS
site_description: Hierarchical Bayesian time-series forecasting
repo_url: https://github.com/ergodic/ergodicts

theme:
  name: material
  palette:
    - scheme: default
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - scheme: slate
      primary: indigo
      accent: indigo
      toggle:
        icon: material/brightness-4
        name: Switch to light mode
  features:
    - content.code.copy
    - navigation.sections
    - navigation.expand
    - navigation.indexes
    - search.suggest
    - toc.follow

plugins:
  - search
  - mkdocstrings:
      handlers:
        python:
          paths: [src]
          options:
            show_source: true
            show_root_heading: true
            heading_level: 2
            docstring_style: numpy
            members_order: source
            show_symbol_type_heading: true
            show_symbol_type_toc: true

markdown_extensions:
  - admonition
  - pymdownx.details
  - pymdownx.superfences
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.snippets:
      base_path: ["."]
  - pymdownx.arithmatex:
      generic: true
  - toc:
      permalink: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Getting Started: getting-started.md
  - Concepts:
      - Hierarchical Forecasting: concepts/hierarchy.md
      - Structural Components: concepts/components.md
      - Causal DAG: concepts/causal-dag.md
      - Bayesian Inference: concepts/inference.md
      - Forecast Harmonization: concepts/harmonization.md
  - Tutorials:
      - End-to-End Pipeline: tutorials/end-to-end.md
      - Backtesting: tutorials/backtesting.md
      - Custom Components: tutorials/custom-components.md
  - API Reference:
      - Forecaster: api/forecaster.md
      - Components: api/components.md
      - Causal DAG: api/causal_dag.md
      - Backtester: api/backtester.md
      - Harmonizer: api/harmonizer.md
      - Dashboard Server: api/server.md
      - Reducer: api/reducer.md
      - Snowflake Client: api/snowflake_client.md
      - Utils: api/utils.md
  - Examples:
      - Query Snowflake: examples/query_snowflake.md
      - Create Table: examples/create_table.md
      - Reducer: examples/reducer.md
      - Harmonizer: examples/harmonizer.md
